<!-- 
  BRANDS SPOTLIGHT COMPONENT
  Purpose: Featured brand showcases with product images (Nike, Adidas, Puma)
  Layout: 3-column brand cards with image + text content
  Classes: brand-spotlight, brand-grid, brand-card
  Responsive: 3-col → 1-col on tablet
  Styling: brands.css
 -->

<section class="section-block brand-spotlight scroll-animate" id="brands">
  <div class="container section-header">
    <span class="eyebrow">Featured brands</span>
    <h2>The biggest sneaker labels, all in one place.</h2>
  </div>
  <div class="container brand-grid">
    <article class="brand-card">
      <div class="brand-card-img-wrapper">
        <img src="Product_Images/pexels-oguz-kagan-cevik-247212801-16947115.jpg" alt="Nike shoes" />
      </div>
      <div class="brand-copy">
        <h3>Nike</h3>
        <p>Innovation-driven performance with iconic style.</p>
      </div>
    </article>
    <article class="brand-card">
      <div class="brand-card-img-wrapper">
        <img src="Product_Images/pexels-oguz-kagan-cevik-247212801-16947114.jpg" alt="Adidas shoes" />
      </div>
      <div class="brand-copy">
        <h3>Adidas</h3>
        <p>Bold silhouettes with advanced comfort technology.</p>
      </div>
    </article>
    <article class="brand-card">
      <div class="brand-card-img-wrapper">
        <img src="Product_Images/pexels-melvin-buezo-1253763-2529148.jpg" alt="Puma shoes" />
      </div>
      <div class="brand-copy">
        <h3>Puma</h3>
        <p>Sport-inspired lifestyle footwear with energetic personality.</p>
      </div>
    </article>
  </div>
</section>
